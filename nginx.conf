# Nginx config for Millennium Eye
# Place at: /etc/nginx/sites-available/millenium-eye
# Then: ln -s /etc/nginx/sites-available/millenium-eye /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect HTTP → HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://unix:/tmp/millenium-eye.sock;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow large JPEG frames (up to 5 MB)
        client_max_body_size 5M;

        # Match gunicorn timeout
        proxy_read_timeout 60s;
    }
}

# HTTPS block — filled in automatically by: sudo certbot --nginx -d YOUR_DOMAIN
# server {
#     listen 443 ssl;
#     server_name YOUR_DOMAIN;
#     ...
# }
