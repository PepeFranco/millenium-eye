<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Millennium Eye — YGO Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e8d5a3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 10px 20px;
      background: #1a1207;
      border-bottom: 1px solid #4a3510;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      color: #c9a84c;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    #status-dot.scanning { background: #2ecc40; box-shadow: 0 0 6px #2ecc40; }
    #status-dot.error    { background: #ff4136; }

    #status-text {
      font-size: 0.8rem;
      color: #888;
      margin-left: auto;
    }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Video area ─────────────────────────────────── */
    #camera-wrap {
      position: relative;
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #video {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    #sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #111;
      border-left: 1px solid #2a1e06;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Portrait / mobile layout ───────────────────── */
    @media (orientation: portrait), (max-width: 600px) {
      main {
        flex-direction: column;
      }

      #camera-wrap {
        flex: 1;
        min-height: 0;
      }

      #sidebar {
        width: 100%;
        height: 50%;
        flex-shrink: 0;
        border-left: none;
        border-top: 1px solid #2a1e06;
      }
    }

    /* ── Sidebar header ─────────────────────────────── */
    #sidebar-header {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #2a1e06;
      flex-shrink: 0;
      gap: 8px;
    }

    #sidebar-header h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c9a84c;
      flex: 1;
    }

    #wishlist-link {
      font-size: 0.72rem;
      color: #666;
      text-decoration: none;
      padding: 3px 8px;
      border: 1px solid #333;
      border-radius: 4px;
      white-space: nowrap;
    }
    #wishlist-link:hover { color: #c9a84c; border-color: #c9a84c; }

    /* ── Wanted section ─────────────────────────────── */
    #wanted-section {
      flex-shrink: 0;
      max-height: 50%;
      border-bottom: 1px solid #3a2800;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #wanted-section.has-items { display: flex; }

    #wanted-header {
      padding: 5px 12px;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c9a84c;
      background: #130f00;
      flex-shrink: 0;
    }

    #wanted-list {
      overflow-y: auto;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .wanted-card {
      background: #1a1500;
      border: 1px solid #c9a84c;
      border-radius: 6px;
      padding: 10px 12px;
      animation: fadeIn 0.2s ease;
    }

    .wanted-card .wc-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e8d5a3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .wanted-card .wc-by {
      font-size: 0.72rem;
      color: #c9a84c;
      margin-bottom: 5px;
    }
    .wanted-card .wc-by-label {
      opacity: 0.6;
      font-style: italic;
    }

    .wanted-card .conf-bar {
      height: 3px;
      background: #2a2000;
      border-radius: 2px;
    }
    .wanted-card .conf-fill {
      height: 100%;
      border-radius: 2px;
      background: #c9a84c;
      transition: width 0.3s;
    }

    /* ── Detected section ────────────────────────────── */
    #detected-section {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #detected-list {
      flex: 1;
      overflow-y: auto;
    }

    .detected-item {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      border-bottom: 1px solid #191919;
      gap: 8px;
      animation: fadeIn 0.2s ease;
    }

    .detected-item .di-name {
      flex: 1;
      font-size: 0.82rem;
      color: #777;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detected-item .di-bar {
      width: 36px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .detected-item .di-fill {
      height: 100%;
      border-radius: 2px;
      background: #444;
      transition: width 0.3s;
    }

    #no-matches {
      color: #444;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 32px;
    }

    #fps-display {
      padding: 8px 16px;
      font-size: 0.72rem;
      color: #444;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* ── Token gate ───────────────────────────────────── */
    #token-gate {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #token-gate.hidden { display: none; }

    #token-box {
      background: #1a1207;
      border: 1px solid #4a3510;
      border-radius: 10px;
      padding: 32px 28px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #token-box h2 {
      color: #c9a84c;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }
    #token-box p {
      font-size: 0.8rem;
      color: #888;
      line-height: 1.5;
    }
    #token-input {
      background: #0d0d0d;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8d5a3;
      font-size: 0.95rem;
      padding: 10px 12px;
      width: 100%;
      outline: none;
    }
    #token-input:focus { border-color: #c9a84c; }
    #token-submit {
      background: #c9a84c;
      border: none;
      border-radius: 6px;
      color: #0d0d0d;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px;
      width: 100%;
    }
    #token-submit:hover { background: #e0bc5a; }
    #token-error {
      color: #ff4136;
      font-size: 0.78rem;
      display: none;
    }
  </style>
</head>
<body>
  <!-- Token gate — hidden once authenticated -->
  <div id="token-gate">
    <div id="token-box">
      <h2>Millennium Eye</h2>
      <p>Enter the access token shared by your local YGO community.</p>
      <input id="token-input" type="password" placeholder="Access token" autocomplete="off" />
      <span id="token-error">Invalid token — try again.</span>
      <button id="token-submit">Enter</button>
    </div>
  </div>

  <header>
    <div id="status-dot"></div>
    <h1>Millennium Eye</h1>
    <span id="status-text">Initialising…</span>
  </header>

  <main>
    <div id="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <aside id="sidebar">
      <div id="sidebar-header">
        <h2>Scanner</h2>
        <a id="wishlist-link" href="/wishlist">Wishlist</a>
      </div>

      <div id="wanted-section">
        <div id="wanted-header">Wanted</div>
        <div id="wanted-list"></div>
      </div>

      <div id="detected-section">
        <div id="detected-list">
          <p id="no-matches">Nothing detected yet</p>
        </div>
      </div>

      <div id="fps-display">— fps</div>
    </aside>
  </main>

  <canvas id="capture-canvas" style="display:none"></canvas>

  <script>
    const video          = document.getElementById('video');
    const overlay        = document.getElementById('overlay');
    const captureCanvas  = document.getElementById('capture-canvas');
    const wantedSection  = document.getElementById('wanted-section');
    const wantedList     = document.getElementById('wanted-list');
    const detectedList   = document.getElementById('detected-list');
    const noMatches      = document.getElementById('no-matches');
    const statusDot      = document.getElementById('status-dot');
    const statusText     = document.getElementById('status-text');
    const fpsDisplay     = document.getElementById('fps-display');
    const ctx            = overlay.getContext('2d');
    const capCtx         = captureCanvas.getContext('2d');

    // ── Token auth ───────────────────────────────────────────────────────────
    const TOKEN_KEY   = 'me_access_token';
    const tokenGate   = document.getElementById('token-gate');
    const tokenInput  = document.getElementById('token-input');
    const tokenSubmit = document.getElementById('token-submit');
    const tokenError  = document.getElementById('token-error');

    let accessToken = localStorage.getItem(TOKEN_KEY) || '';

    async function verifyToken(token) {
      // Send a minimal request to check the token is valid
      const res = await fetch('/api/recognize', {
        method: 'POST',
        headers: { 'X-Access-Token': token, 'Content-Type': 'image/jpeg' },
        body: new Uint8Array(0),
      });
      return res.status !== 401;
    }

    async function initAuth() {
      if (accessToken) {
        const ok = await verifyToken(accessToken);
        if (ok) {
          tokenGate.classList.add('hidden');
          startCamera();
          loadWishlist();
          return;
        }
        // stored token is no longer valid
        localStorage.removeItem(TOKEN_KEY);
        accessToken = '';
      }
      tokenGate.classList.remove('hidden');
    }

    tokenSubmit.addEventListener('click', async () => {
      const t = tokenInput.value.trim();
      if (!t) return;
      tokenSubmit.disabled = true;
      const ok = await verifyToken(t);
      tokenSubmit.disabled = false;
      if (ok) {
        accessToken = t;
        localStorage.setItem(TOKEN_KEY, t);
        tokenError.style.display = 'none';
        tokenGate.classList.add('hidden');
        startCamera();
        loadWishlist();
      } else {
        tokenError.style.display = 'block';
        tokenInput.select();
      }
    });

    tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') tokenSubmit.click(); });

    // ── recent matches dedup (30 s window) ──────────────────────────────────
    const DEDUP_MS    = 30_000;
    const STABLE_HITS = 3;       // frames a card must appear before shown
    const recentSeen  = new Map(); // card_id → timestamp
    const pendingHits = new Map(); // card_id → consecutive hit count

    function isSeen(id) {
      const t = recentSeen.get(id);
      return t && (Date.now() - t < DEDUP_MS);
    }

    function markSeen(id) {
      recentSeen.set(id, Date.now());
      pendingHits.delete(id);
    }

    // Returns true when the card has just become stable (ready to show).
    function isStable(id) {
      const count = (pendingHits.get(id) || 0) + 1;
      pendingHits.set(id, count);
      return count >= STABLE_HITS;
    }

    // ── sidebar ──────────────────────────────────────────────────────────────
    function addMatchToSidebar(match) {
      noMatches.style.display = 'none';

      const nameLower   = match.card_name.toLowerCase();
      const wantedByAll = wishlist.filter(e => e.card_name.toLowerCase() === nameLower);
      const pct         = (match.confidence * 100).toFixed(0);

      if (wantedByAll.length > 0) {
        // ── Wanted card (prominent) ──
        const existingW = document.getElementById(`wanted-${match.card_id}`);
        if (existingW) {
          existingW.querySelector('.conf-fill').style.width = `${pct}%`;
          return;
        }
        const byLines = wantedByAll.map(e => {
          const parts = [escapeHtml(e.player_name)];
          if (e.preferred_rarity) parts.push(escapeHtml(e.preferred_rarity));
          if (e.preferred_set)    parts.push(escapeHtml(e.preferred_set));
          return parts.join(' · ');
        }).join('<br>');
        const wEl = document.createElement('div');
        wEl.className = 'wanted-card';
        wEl.id = `wanted-${match.card_id}`;
        wEl.innerHTML = `
          <div class="wc-name" title="${escapeHtml(match.card_name)}">${escapeHtml(match.card_name)}</div>
          <div class="wc-by"><span class="wc-by-label">Wanted by: </span>${byLines}</div>
          <div class="conf-bar"><div class="conf-fill" style="width:${pct}%"></div></div>`;
        wantedList.prepend(wEl);
        wantedSection.classList.add('has-items');
        while (wantedList.children.length > 10) wantedList.lastChild.remove();

      } else {
        // ── Regular detected card (compact) ──
        const existingD = document.getElementById(`det-${match.card_id}`);
        if (existingD) {
          existingD.querySelector('.di-fill').style.width = `${pct}%`;
          detectedList.insertBefore(existingD, detectedList.firstElementChild);
          return;
        }
        const dEl = document.createElement('div');
        dEl.className = 'detected-item';
        dEl.id = `det-${match.card_id}`;
        dEl.innerHTML = `
          <span class="di-name" title="${escapeHtml(match.card_name)}">${escapeHtml(match.card_name)}</span>
          <div class="di-bar"><div class="di-fill" style="width:${pct}%"></div></div>`;
        detectedList.insertBefore(dEl, detectedList.firstElementChild);
        while (detectedList.children.length > 30) detectedList.lastChild.remove();
      }
    }

    // ── overlay drawing ──────────────────────────────────────────────────────
    function drawDetections(detections, scaleX, scaleY) {
      ctx.clearRect(0, 0, overlay.width, overlay.height);

      for (const det of detections) {
        const corners = det.corners;
        const match   = det.match;
        const lowConf = det.low_confidence;

        // colour: green = match, yellow = low_conf, red = no match
        const color = match ? '#00ff41' : (lowConf ? '#ffee00' : '#ff3030');

        ctx.beginPath();
        ctx.moveTo(corners[0][0] * scaleX, corners[0][1] * scaleY);
        for (let i = 1; i < corners.length; i++) {
          ctx.lineTo(corners[i][0] * scaleX, corners[i][1] * scaleY);
        }
        ctx.closePath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();

        if (match) {
          const x = corners[0][0] * scaleX;
          const y = Math.max(corners[0][1] * scaleY - 14, 18);
          const label = `${match.card_name}  ${(match.confidence * 100).toFixed(0)}%`;

          ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
          ctx.textBaseline = 'bottom';
          const tw = ctx.measureText(label).width;

          ctx.fillStyle = 'rgba(0,0,0,0.65)';
          ctx.fillRect(x - 2, y - 16, tw + 8, 20);

          ctx.fillStyle = color;
          ctx.fillText(label, x + 2, y);
        }
      }
    }

    // ── video rotation detection ─────────────────────────────────────────────
    // Some mobile browsers stream landscape video even when the phone is held
    // in portrait. Detect this and rotate both the display and the capture.
    let videoRotated = false;

    function checkVideoRotation() {
      const wrap           = video.parentElement;
      const screenPortrait = window.innerHeight > window.innerWidth;
      const videoLandscape = video.videoWidth   > video.videoHeight;
      videoRotated = screenPortrait && videoLandscape;

      if (videoRotated) {
        // Center the video in the wrap, swap w/h so it fills correctly after 90° rotation
        video.style.position  = 'absolute';
        video.style.left      = '50%';
        video.style.top       = '50%';
        video.style.width     = `${wrap.offsetHeight}px`;
        video.style.height    = `${wrap.offsetWidth}px`;
        video.style.maxWidth  = 'none';
        video.style.maxHeight = 'none';
        video.style.transform = 'translate(-50%, -50%) rotate(90deg)';
      } else {
        video.style.position  = '';
        video.style.left      = '';
        video.style.top       = '';
        video.style.transform = '';
        video.style.width     = '';
        video.style.height    = '';
        video.style.maxWidth  = '';
        video.style.maxHeight = '';
      }
    }

    window.addEventListener('resize', checkVideoRotation);

    // ── main loop ────────────────────────────────────────────────────────────
    const CAPTURE_W = 1280;
    let frameTimestamps = [];

    async function captureAndSend() {
      if (video.readyState < 2) return;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;

      // Determine capture dimensions (must be declared here so toBlob callback can access them)
      let capW, capH;
      if (videoRotated) {
        capH = CAPTURE_W;
        capW = Math.round(CAPTURE_W * vh / vw);
      } else {
        capW = CAPTURE_W;
        capH = Math.round(CAPTURE_W * vh / vw);
      }

      captureCanvas.width  = capW;
      captureCanvas.height = capH;

      if (videoRotated) {
        // Rotate 90° CW so the server gets a correctly oriented portrait frame
        capCtx.save();
        capCtx.translate(capW, 0);
        capCtx.rotate(Math.PI / 2);
        capCtx.drawImage(video, 0, 0, capH, capW);
        capCtx.restore();
      } else {
        capCtx.drawImage(video, 0, 0, capW, capH);
      }

      captureCanvas.toBlob(async (blob) => {
        if (!blob) return;

        try {
          const res = await fetch('/api/recognize', {
            method: 'POST',
            headers: { 'Content-Type': 'image/jpeg', 'X-Access-Token': accessToken },
            body: blob,
          });

          if (res.status === 401) {
            localStorage.removeItem(TOKEN_KEY);
            accessToken = '';
            tokenGate.classList.remove('hidden');
            statusDot.className = 'error';
            statusText.textContent = 'Session expired — re-enter token';
            return;
          }
          if (!res.ok) { requestAnimationFrame(captureAndSend); return; }

          const data = await res.json();

          // sync overlay to the camera-wrap (accounts for CSS rotation on the video)
          const wrap = video.parentElement;
          overlay.width  = wrap.offsetWidth;
          overlay.height = wrap.offsetHeight;

          // scale factors: captured coords → displayed coords
          const dispScaleX = wrap.offsetWidth  / capW;
          const dispScaleY = wrap.offsetHeight / capH;

          drawDetections(data.detections, dispScaleX, dispScaleY);

          // update sidebar
          // Collect card IDs seen this frame to reset pending counts for
          // cards that disappeared.
          const seenThisFrame = new Set();
          for (const det of data.detections) {
            if (!det.match) continue;
            const id = det.match.card_id;
            seenThisFrame.add(id);
            if (!isSeen(id) && isStable(id)) {
              markSeen(id);
              addMatchToSidebar(det.match);
            }
          }
          // Reset pending count for any card not seen this frame.
          for (const id of pendingHits.keys()) {
            if (!seenThisFrame.has(id)) pendingHits.delete(id);
          }

          // fps + detection count
          const now = Date.now();
          frameTimestamps.push(now);
          frameTimestamps = frameTimestamps.filter(t => now - t < 2000);
          const n = data.detections.length;
          fpsDisplay.textContent = `${(frameTimestamps.length / 2).toFixed(1)} fps  |  ${n} card${n !== 1 ? 's' : ''} detected`;

        } catch (e) {
          statusText.textContent = 'Server error';
          statusDot.className = 'error';
        }

        // next frame immediately after this one resolves
        requestAnimationFrame(captureAndSend);
      }, 'image/jpeg', 0.92);
    }

    // ── Wishlist (loaded for match highlighting only) ─────────────────────────
    let wishlist = [];

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function loadWishlist() {
      try {
        const res = await fetch('/api/wishlist', {
          headers: { 'X-Access-Token': accessToken },
        });
        if (!res.ok) return;
        wishlist = await res.json();
      } catch {}
    }

    // ── camera init ──────────────────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false,
        });
        video.srcObject = stream;
        video.addEventListener('loadedmetadata', checkVideoRotation);
        await video.play();
        checkVideoRotation();
        statusDot.className = 'scanning';
        statusText.textContent = 'Scanning…';
        requestAnimationFrame(captureAndSend);
      } catch (err) {
        statusText.textContent = `Camera error: ${err.message}`;
        statusDot.className = 'error';
      }
    }

    initAuth();
  </script>
</body>
</html>
